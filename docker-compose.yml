services:
  db:
    image: docker.io/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: reimbursement
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d reimbursement"]
      interval: 5s
      timeout: 5s
      retries: 10

  rustfs:
    image: docker.io/rustfs/rustfs:latest
    restart: unless-stopped
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: "0.0.0.0:9000"
      RUSTFS_CONSOLE_ADDRESS: "0.0.0.0:9001"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
    volumes:
      - rustfsdata:/data

  migrate:
    build:
      context: ./backend
    command: deno run -A npm:prisma@^7 migrate deploy
    environment:
      DATABASE_URL: postgresql://app:${DB_PASSWORD}@db:5432/reimbursement
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://app:${DB_PASSWORD}@db:5432/reimbursement
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      S3_ENDPOINT: http://rustfs:9000
      S3_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      S3_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      S3_BUCKET: documents
      CURRENCY: ${CURRENCY:-CAD}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:8080/s3}
      PORT: "8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      rustfs:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        VITE_CURRENCY: ${CURRENCY:-CAD}
    profiles:
      - build-only

  gateway:
    build:
      context: .
      dockerfile: ./gateway/Dockerfile
      args:
        VITE_CURRENCY: ${CURRENCY:-CAD}
    restart: unless-stopped
    depends_on:
      - api
      - rustfs
    volumes:
      - ./gateway/Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      - "8080:80"

volumes:
  pgdata:
  rustfsdata:
